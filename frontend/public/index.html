<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4F46E5" />
    <meta
      name="description"
      content="Smart Employee Commute System - Ride Sharing Platform"
    />

    <!-- Leaflet CSS for OpenStreetMap -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Tab Icon -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <title>SmartCommute — Employee Ride Sharing</title>

    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #f5f7ff;
        color: #1e1b4b;
        -webkit-font-smoothing: antialiased;
      }

      /* Loading screen shown before React loads */
      #loading {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #eef2ff;
      }

      #loading .logo {
        font-size: 56px;
        margin-bottom: 16px;
        animation: pulse 1.5s infinite;
      }

      #loading h2 {
        font-size: 24px;
        font-weight: 700;
        color: #4f46e5;
        margin-bottom: 8px;
      }

      #loading p {
        font-size: 14px;
        color: #6b7280;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%       { transform: scale(1.1); }
      }

      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #c7d2fe;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4f46e5;
      }
    </style>
  </head>

  <body>
    <!-- Shown before React loads -->
    <div id="loading">
      <div class="logo">🚗</div>
      <h2>SmartCommute</h2>
      <p>Loading your ride sharing platform...</p>
    </div>

    <!-- React mounts here and replaces loading screen -->
    <div id="root"></div>

    <script>
      // Hide loading screen once React is ready
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loading = document.getElementById('loading');
          if (loading) loading.style.display = 'none';
        }, 500);
      });
    </script>
  </body>
</html>
